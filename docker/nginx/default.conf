upstream tabel_app {
    server web:8000;
}

# HTTP → редирект на HTTPS
server {
    listen 80;
    server_name portalmotionweb.com www.portalmotionweb.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name portalmotionweb.com www.portalmotionweb.com;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/portalmotionweb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portalmotionweb.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /static/ {
        alias /vol/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /api/ {
        proxy_pass http://tabel_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://tabel_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /index.html {
        root /vol/frontend;
        add_header Cache-Control "no-cache";
    }

    location / {
        root /vol/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
