services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_POSTGRES:-tabel}
      POSTGRES_USER: ${DB_USER:-tabel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tabel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tabel} -d ${DB_POSTGRES:-tabel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "False"
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: 5432
      USE_X_FORWARDED_HOST: "True"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/tabel_project/staticfiles
      - frontend_dist:/vol/frontend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443" 
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/vol/static:ro
      - frontend_dist:/vol/frontend:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro 

volumes:
  postgres_data:
  static_volume:
  frontend_dist:
